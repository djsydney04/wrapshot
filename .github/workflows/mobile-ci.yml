name: Mobile CI

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/mobile-ci.yml"
  push:
    branches:
      - main
      - staging
      - production
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/mobile-ci.yml"

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    runs-on: ubuntu-latest
    env:
      CI: true
      EXPO_NO_TELEMETRY: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint mobile
        run: npm run lint --workspace=mobile

      - name: Typecheck mobile
        run: npm run typecheck --workspace=mobile

      - name: Build mobile bundle
        run: npm run build --workspace=mobile
